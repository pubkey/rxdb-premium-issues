name: Update RxDB Packages

on:
  repository_dispatch:
    types: [update-rxdb]
  workflow_dispatch:

jobs:
  update-rxdb:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set node version
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Create env file
        run: |
          touch .env
          echo RXDB_PREMIUM=${{ secrets.RXDB_PREMIUM }} >> .env

      - name: Update rxdb, rxdb-server, and rxdb-premium
        run: |
          npm install rxdb@latest rxdb-server@latest rxdb-premium@latest

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet package.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push to master
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: update rxdb, rxdb-server, and rxdb-premium to latest"
          git push origin master
